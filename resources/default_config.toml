# Pixiis default configuration
# Copy to %APPDATA%/pixiis/config.toml and customize

[voice]
live_model = "base"
final_model = "base"
device = "auto"                # "auto" = CUDA if available, else CPU
energy_threshold = 300.0
vad_backend = "silero"          # "silero" or "webrtc"
sample_rate = 16000

[voice.tts]
enabled = true
voice = "am_michael"
speed = 1.0

[voice.transcription]
fast_beam_size = 3
quality_beam_size = 5
language = "en"
no_speech_threshold = 0.6
compression_ratio_threshold = 2.4

[controller]
deadzone = 0.15
vibration_enabled = true
hold_threshold_ms = 200         # ms before a press becomes a hold
combo_window_ms = 150           # ms window for combo detection
voice_trigger = "rt"            # "rt", "lt", "hold_y", "hold_x"

[controller.macros]
# Format: "button:N" or "combo:N+M" = { action = "...", mode = "press|hold", target = "..." }
# Xbox A button = voice record (hold to talk)
"button:0" = { action = "voice_record", mode = "hold" }
# Xbox B button = go back
"button:1" = { action = "navigate_ui", mode = "press", target = "back" }
# Xbox X button = search
"button:2" = { action = "navigate_ui", mode = "press", target = "search" }
# Xbox Y button = toggle favorite
"button:3" = { action = "favorite_toggle", mode = "press" }
# LB+RB = open file manager
"combo:4+5" = { action = "navigate_ui", mode = "combo", target = "file_manager" }

[library]
providers = ["steam", "xbox", "epic", "gog", "ea", "startmenu", "folders", "manual"]
favorites = []  # list of app IDs marked as favorite
scan_interval_minutes = 60

[library.steam]
# Auto-detected from registry, override here if needed
# install_path = "C:/Program Files (x86)/Steam"

[library.folders]
extra_paths = []
# Add custom paths: ["D:\\MyGames", "E:\\Games"]

[library.manual]
# Add custom apps here
# [[library.manual.apps]]
# name = "Discord"
# path = "C:/Users/.../Discord.exe"
# icon = ""

[ui]
tile_size = "large"             # "small", "medium", "large"
animations = true
fullscreen = true
scale = 1.0                     # UI scale factor (1.0 = desktop, 1.5 = couch/TV)

[ui.colors]
primary = "#1a1a2e"
secondary = "#16213e"
accent = "#0f3460"
background = "#0d0d0f"
text_color = "#e0e0e8"
text_secondary = "#8888a0"
font_family = "Segoe UI"
border_radius = 8

[services.rawg]
api_key = ""

[services.youtube]
api_key = ""

[services.twitch]
client_id = ""
client_secret = ""
access_token = ""

[daemon]
autostart = false
