[package]
name = "pixiis"
version = "0.2.0"
description = "Pixiis — controller-first launcher with voice"
authors = ["Fidelis Karuri"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "pixiis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
# ts-rs lives in [dependencies] (not [dev-dependencies]) because #[derive(TS)]
# is expanded during normal compilation; the auto-generated `#[test]` hooks
# emit `frontend/src/api/types/*.ts` when `cargo test` runs.
ts-rs = { version = "10", features = ["serde-compat", "no-serde-warnings", "serde-json-impl"] }

# Controller (gilrs poller, macro engine) + services runtime.
gilrs = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "net"] }
parking_lot = "0.12"
toml = "0.8"

# Services layer (Pane 9)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "gzip"] }
axum = { version = "0.7", default-features = false, features = ["tokio", "http1", "query"] }
urlencoding = "2"
sha2 = "0.10"
lru = "0.12"
webbrowser = "1"

# Start Menu shortcut parsing (.lnk → target exe path). Pure-Rust parser,
# safe on every target — not gated by `cfg(windows)` so unit tests can
# read shipped binary fixtures on Linux CI.
lnk = "0.5"
# quick-xml parses AppxManifest.xml + MicrosoftGame.Config for the Xbox /
# UWP scanner (Pane 4). Cross-platform so the manifest-parsing unit tests
# run on Linux CI even though the WinRT enumeration is Windows-only.
quick-xml = "0.31"
# Voice subsystem (Wave 2 — Panes 1 + 2):
# - whisper-rs binds whisper.cpp; default features compile bundled C/C++.
# - cpal owns the platform audio device (input for STT, output for TTS).
# - ort 2.0 runs both the Silero VAD model (Pane 1) and Kokoro v1.0 (Pane 2).
#   `load-dynamic` dlopens onnxruntime at runtime so we don't carry an
#   openssl/ureq build-time chain (matches the Wave 1 Kokoro spike, see
#   spike/kokoro-bench/RESULTS.md). Hard dep because Kokoro TTS needs it on
#   every build; the `silero-vad` feature gates Silero VAD code paths only.
# - ndarray is a hard dep of ort + the Kokoro pipeline.
# - crossbeam-channel for STT audio capture → pipeline plumbing.
# - libloading is for the espeak-ng FFI wrapper (Kokoro phonemiser).
# - zip + byteorder parse Kokoro voices-v1.0.bin (np.savez of f32 npy).
# - num_cpus picks the ORT intra-op thread count.
whisper-rs = { version = "0.13", default-features = false }
cpal = "0.15"
ort = { version = "=2.0.0-rc.10", default-features = false, features = ["std", "ndarray", "load-dynamic", "cuda"] }
ndarray = "0.16"
crossbeam-channel = "0.5"
dirs = "5"
libloading = "0.8"
zip = { version = "2", default-features = false, features = ["deflate"] }
byteorder = "1"
num_cpus = "1.16"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_UI_Input_XboxController",
    # Voice text injection (Pane 1) — SendInput keyboard synthesis.
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_Foundation",
    # Xbox / UWP scanner — WinRT PackageManager + manifest helpers (Pane 4).
    "Management_Deployment",
    "ApplicationModel",
    "ApplicationModel_Core",
    "ApplicationModel_AppExtensions",
    "Foundation",
    "Foundation_Collections",
    "Storage",
    "Win32_System_Com",
] }
# Steam (and now GOG/EA) library scanners read storefront state from HKLM.
winreg = "0.52"

[dev-dependencies]
httpmock = "0.7"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[features]
# Set by Tauri CLI for production builds. Do not remove.
custom-protocol = ["tauri/custom-protocol"]
# Enable the Silero ONNX VAD path. Off by default — relies on
# `onnxruntime.dll` being resolvable at runtime. EnergyVad is always
# available as a fallback. ort + ndarray are no longer optional (Kokoro
# TTS — Pane 2 — needs them on every build), so this feature is now a
# pure code-path marker.
silero-vad = []
