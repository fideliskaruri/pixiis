[package]
name = "pixiis"
version = "0.1.0"
description = "Pixiis — controller-first launcher with voice"
authors = ["Pixiis"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "pixiis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
# ts-rs lives in [dependencies] (not [dev-dependencies]) because #[derive(TS)]
# is expanded during normal compilation; the auto-generated `#[test]` hooks
# emit `frontend/src/api/types/*.ts` when `cargo test` runs.
ts-rs = { version = "10", features = ["serde-compat", "no-serde-warnings", "serde-json-impl"] }

# Controller (gilrs poller, macro engine) + services runtime.
gilrs = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "net"] }
parking_lot = "0.12"
toml = "0.8"

# Services layer (Pane 9)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "gzip"] }
axum = { version = "0.7", default-features = false, features = ["tokio", "http1", "query"] }
urlencoding = "2"
sha2 = "0.10"
lru = "0.12"
webbrowser = "1"

# Voice subsystem (TTS — Pane 2 / Wave 2). Pane 1 (STT) will pull the same
# `ort` + `cpal` versions on its own merge — feature sets are deliberately
# identical so the two-pane Cargo.toml merge is additive.
# - ort 2.0 runs Kokoro v1.0; `load-dynamic` dlopens onnxruntime at runtime so
#   we don't carry an openssl/ureq build-time chain (matches the Wave 1 spike,
#   see spike/kokoro-bench/RESULTS.md). `ndarray` is a hard dep of `ort`.
# - cpal owns the audio output device (Pane 1 will share for input).
# - libloading is for the espeak-ng FFI wrapper.
# - zip + byteorder parse voices-v1.0.bin (np.savez of f32 npy).
# - num_cpus picks the ORT intra-op thread count.
ort = { version = "=2.0.0-rc.10", default-features = false, features = ["std", "ndarray", "load-dynamic", "cuda"] }
ndarray = "0.16"
cpal = "0.15"
libloading = "0.8"
zip = { version = "2", default-features = false, features = ["deflate"] }
byteorder = "1"
num_cpus = "1.16"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = ["Win32_UI_Input_XboxController", "Win32_Foundation"] }
# Steam library scanner reads HKLM\SOFTWARE\Wow6432Node\Valve\Steam.
winreg = "0.52"

[dev-dependencies]
httpmock = "0.7"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[features]
# Set by Tauri CLI for production builds. Do not remove.
custom-protocol = ["tauri/custom-protocol"]
