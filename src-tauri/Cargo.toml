[package]
name = "pixiis"
version = "0.2.0"
description = "Pixiis — controller-first launcher with voice"
authors = ["Fidelis Karuri"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "pixiis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
# Global hotkey ("summon Pixiis"). The plugin owns the OS-level
# RegisterHotKey on Windows; we register our default (Ctrl+Shift+Alt+P)
# at setup and re-register on demand from the Settings page.
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
# ts-rs lives in [dependencies] (not [dev-dependencies]) because #[derive(TS)]
# is expanded during normal compilation; the auto-generated `#[test]` hooks
# emit `frontend/src/api/types/*.ts` when `cargo test` runs.
ts-rs = { version = "10", features = ["serde-compat", "no-serde-warnings", "serde-json-impl"] }

# Controller (gilrs poller, macro engine) + services runtime.
gilrs = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "net"] }
parking_lot = "0.12"
toml = "0.8"
# toml_edit preserves comments + ordering when we round-trip the user's
# `%APPDATA%/pixiis/config.toml` through `config_set`. Pinned to 0.20 to
# match the version `toml 0.8.2` already pulls in transitively.
toml_edit = "0.20"

# Services layer (Pane 9). `blocking` is on so the voice model
# downloader can stream the HuggingFace fallback to disk on a
# spawn_blocking thread without bringing in a second executor.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "gzip", "blocking", "stream"] }
axum = { version = "0.7", default-features = false, features = ["tokio", "http1", "query"] }
urlencoding = "2"
sha2 = "0.10"
lru = "0.12"
webbrowser = "1"

# Start Menu shortcut parsing (.lnk → target exe path). Pure-Rust parser,
# safe on every target — not gated by `cfg(windows)` so unit tests can
# read shipped binary fixtures on Linux CI.
lnk = "0.5"
# quick-xml parses AppxManifest.xml + MicrosoftGame.Config for the Xbox /
# UWP scanner (Pane 4). Cross-platform so the manifest-parsing unit tests
# run on Linux CI even though the WinRT enumeration is Windows-only.
quick-xml = "0.31"
# Voice STT subsystem:
# - whisper-rs binds whisper.cpp; default features compile bundled C/C++.
# - cpal owns the platform audio input device.
# - ort 2.0 runs the Silero VAD model. `load-dynamic` dlopens onnxruntime
#   at runtime so we don't carry an openssl/ureq build-time chain.
#   Optional and gated behind the `silero-vad` feature — EnergyVad is the
#   always-available fallback.
# - ndarray is the tensor type ort exposes; optional alongside ort.
# - crossbeam-channel for STT audio capture → pipeline plumbing.
whisper-rs = { version = "0.16", default-features = false }
cpal = "0.15"
ort = { version = "=2.0.0-rc.10", default-features = false, features = ["std", "ndarray", "load-dynamic", "cuda"], optional = true }
ndarray = { version = "0.16", optional = true }
crossbeam-channel = "0.5"
dirs = "5"

# Cross-platform process enumeration for the running-game tracker.
# We use it to resolve URL-based launches (Steam / Epic / Xbox) into the
# actual game PID by walking the process tree and matching cmdline / cwd
# against the entry's `exe_path` install dir, then to terminate the
# tracked process when the user clicks STOP from inside the app.
sysinfo = "0.31"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_UI_Input_XboxController",
    # Voice text injection (Pane 1) — SendInput keyboard synthesis.
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_Foundation",
    # Xbox / UWP scanner — WinRT PackageManager + manifest helpers (Pane 4).
    "Management_Deployment",
    "ApplicationModel",
    "ApplicationModel_Core",
    "ApplicationModel_AppExtensions",
    "Foundation",
    "Foundation_Collections",
    "Storage",
    "Win32_System_Com",
] }
# Steam (and now GOG/EA) library scanners read storefront state from HKLM.
winreg = "0.52"

[dev-dependencies]
httpmock = "0.7"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[features]
# Set by Tauri CLI for production builds. Do not remove.
custom-protocol = ["tauri/custom-protocol"]
# Enable the Silero ONNX VAD path. Off by default — relies on
# `onnxruntime.dll` being resolvable at runtime and pulls in `ort` +
# `ndarray` as build-time deps. EnergyVad is always available as a
# fallback when this feature is off.
silero-vad = ["dep:ort", "dep:ndarray"]
