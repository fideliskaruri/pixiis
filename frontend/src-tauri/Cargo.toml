[package]
name = "pixiis"
version = "0.1.0"
description = "Pixiis — controller-first launcher with voice"
authors = ["Pixiis"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "pixiis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
# ts-rs lives in [dependencies] (not [dev-dependencies]) because #[derive(TS)]
# is expanded during normal compilation; the auto-generated `#[test]` hooks
# emit `frontend/src/api/types/*.ts` when `cargo test` runs.
ts-rs = { version = "10", features = ["serde-compat", "no-serde-warnings", "serde-json-impl"] }

# Controller (gilrs poller, macro engine).
gilrs = "0.10"
tokio = { version = "1", features = ["sync", "time", "rt", "macros"] }
parking_lot = "0.12"
toml = "0.8"

[features]
# Set by Tauri CLI for production builds. Do not remove.
custom-protocol = ["tauri/custom-protocol"]
