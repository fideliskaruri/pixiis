[package]
name = "pixiis"
version = "0.1.0"
description = "Pixiis — controller-first launcher with voice"
authors = ["Pixiis"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "pixiis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
# ts-rs lives in [dependencies] (not [dev-dependencies]) because #[derive(TS)]
# is expanded during normal compilation; the auto-generated `#[test]` hooks
# emit `frontend/src/api/types/*.ts` when `cargo test` runs.
ts-rs = { version = "10", features = ["serde-compat", "no-serde-warnings", "serde-json-impl"] }

# Controller (gilrs poller, macro engine) + services runtime.
gilrs = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "net"] }
parking_lot = "0.12"
toml = "0.8"

# Services layer (Pane 9)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "gzip"] }
axum = { version = "0.7", default-features = false, features = ["tokio", "http1", "query"] }
urlencoding = "2"
sha2 = "0.10"
lru = "0.12"
webbrowser = "1"

# Voice subsystem (Pane 1 / Wave 2):
# - whisper-rs binds whisper.cpp; default features compile bundled C/C++.
# - cpal owns the platform input stream (WASAPI on Windows).
# - ort runs the Silero VAD ONNX model; load-dynamic dlopens onnxruntime
#   at runtime so we don't add a build-time C++ deps trail (matches the
#   Wave 1 Kokoro spike's choice — see spike/kokoro-bench/RESULTS.md).
#   Behind the `silero-vad` feature so the default build doesn't depend on
#   the ort API (which is in rc churn); EnergyVad is always available.
# - crossbeam-channel for the audio capture → pipeline plumbing.
whisper-rs = { version = "0.13", default-features = false }
cpal = "0.15"
ort = { version = "2.0.0-rc.10", default-features = false, features = ["load-dynamic", "ndarray"], optional = true }
ndarray = { version = "0.16", optional = true }
crossbeam-channel = "0.5"
dirs = "5"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
    "Win32_UI_Input_XboxController",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_Foundation",
] }
# Steam library scanner reads HKLM\SOFTWARE\Wow6432Node\Valve\Steam.
winreg = "0.52"

[dev-dependencies]
httpmock = "0.7"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[features]
# Set by Tauri CLI for production builds. Do not remove.
custom-protocol = ["tauri/custom-protocol"]
# Enable the Silero ONNX VAD path. Off by default — relies on `ort` 2.0-rc
# whose API still moves between versions and on `onnxruntime.dll` being
# resolvable at runtime. EnergyVad is always available as a fallback.
silero-vad = ["dep:ort", "dep:ndarray"]
